services:

  # ════════════════════════════════════════════════════════════
  #  gNB  —  Physical (USRP)
  # ════════════════════════════════════════════════════════════
  oai-gnb:
        image: ${REGISTRY-oaisoftwarealliance/}${GNB_IMG:-oai-gnb}:${TAG:-2026.w18}
        container_name: oai-gnb
        cap_add:
            - SYS_NICE
            - IPC_LOCK
        cap_drop:
            - ALL
        privileged: true
        env_file:
            - .env.gnb
        environment:
            UHD_IMAGES_DIR: "/usr/share/uhd/images"
            ASAN_OPTIONS: detect_leaks=0
        networks:
         default:
           ipv4_address: 172.22.0.25
         macvlan0:
           ipv4_address: 192.168.30.1
         macvlan1:
           ipv4_address: 192.168.31.1
         macvlan2:
           ipv4_address: 192.168.40.1
        volumes:
            - ./confs/gnb_template.conf:/opt/oai-gnb/etc/gnb.conf
            - /dev/bus/usb/:/dev/bus/usb/
            - /usr/local/share/uhd/images:/usr/share/uhd/images
        command: >
          /bin/bash -c "
          exec /tini -s -v /opt/oai-gnb/bin/entrypoint.sh /opt/oai-gnb/bin/nr-softmodem"
        healthcheck:
            test: /bin/bash -c "pgrep nr-softmodem"
            start_period: 10s
            start_interval: 500ms
            interval: 10s
            timeout: 5s
            retries: 5

  # ════════════════════════════════════════════════════════════
  #  gNB  —  RFSimulator (no hardware)
  #  USE_ADDITIONAL_OPTIONS=--rfsim -E  viene da .env.gnb
  # ════════════════════════════════════════════════════════════
  oai-gnb-rfsim:
        image: ${REGISTRY-oaisoftwarealliance/}${GNB_IMG:-oai-gnb}:${TAG:-2026.w18}
        container_name: oai-gnb-rfsim
        cap_add:
            - SYS_NICE
            - IPC_LOCK
        cap_drop:
            - ALL
        privileged: true
        env_file:
            - .env.gnb
        environment:
            ASAN_OPTIONS: detect_leaks=0
        networks:
         default:
           ipv4_address: 172.22.0.25
        volumes:
            - ./confs/gnb_template.conf:/opt/oai-gnb/etc/gnb.conf
        command: >
          /bin/bash -c "
          exec /tini -s -v /opt/oai-gnb/bin/entrypoint.sh /opt/oai-gnb/bin/nr-softmodem"
        healthcheck:
            test: /bin/bash -c "pgrep nr-softmodem"
            start_period: 10s
            start_interval: 500ms
            interval: 10s
            timeout: 5s
            retries: 5

  # ════════════════════════════════════════════════════════════
  #  gNB custom build  —  Physical (USRP)
  # ════════════════════════════════════════════════════════════
  gnb-cst:
        build:
            context: .
            dockerfile: Dockerfile_gnb
        image: gnb-cst:latest
        container_name: gnb-cst
        privileged: true
        cap_add:
            - SYS_NICE
            - IPC_LOCK
        mem_limit: 4g
        cap_drop:
            - ALL
        env_file:
            - .env.gnb
        environment:
            UHD_IMAGES_DIR: "/usr/share/uhd/images"
            ASAN_OPTIONS: detect_leaks=0
        networks:
         default:
           ipv4_address: 172.22.0.25
         macvlan0:
           ipv4_address: 192.168.30.1
         macvlan1:
           ipv4_address: 192.168.31.1
         macvlan2:
           ipv4_address: 192.168.40.1
        volumes:
            - ./confs/gnb_template.conf:/opt/oai-gnb/etc/gnb.conf
            - /dev/bus/usb/:/dev/bus/usb/
            - /usr/local/share/uhd/images:/usr/share/uhd/images
        healthcheck:
            test: /bin/bash -c "pgrep nr-softmodem"
            start_period: 10s
            start_interval: 500ms
            interval: 10s
            timeout: 5s
            retries: 5

  # ════════════════════════════════════════════════════════════
  #  gNB custom build  —  RFSimulator (no hardware)
  # ════════════════════════════════════════════════════════════
  gnb-cst-rfsim:
        build:
            context: .
            dockerfile: Dockerfile_gnb
        image: gnb-cst:latest
        container_name: gnb-cst
        privileged: true
        cap_add:
            - SYS_NICE
            - IPC_LOCK
        mem_limit: 4g
        cap_drop:
            - ALL
        env_file:
            - .env.gnb
        environment:
            ASAN_OPTIONS: detect_leaks=0
        networks:
         default:
           ipv4_address: 172.22.0.25
        volumes:
            - ./confs/gnb_template.conf:/opt/oai-gnb/etc/gnb.conf
        command: >
          /bin/bash -c "
          exec /tini -s -v /opt/oai/bin/entrypoint.sh /opt/oai/bin/nr-softmodem"
        healthcheck:
            test: /bin/bash -c "pgrep nr-softmodem"
            start_period: 10s
            start_interval: 500ms
            interval: 10s
            timeout: 5s
            retries: 5

  # ════════════════════════════════════════════════════════════
  #  UE  —  Physical (USRP)
  # ════════════════════════════════════════════════════════════
  oai-nr-ue:
        image: ${REGISTRY-oaisoftwarealliance/}${NRUE_IMG:-oai-nr-ue}:${TAG:-2026.w18}
        container_name: oai-nr-ue
        cap_drop:
            - ALL
        cap_add:
            - NET_ADMIN
            - NET_RAW
            - SYS_NICE
        privileged: true
        env_file:
          - .env.ue
        environment:
            UHD_IMAGES_DIR: "/usr/share/uhd/images"
        network_mode: host
        devices:
             - /dev/net/tun:/dev/net/tun
        volumes:
            - ./confs/ue_template.conf:/opt/oai-nr-ue/etc/nr-ue.conf
            - /dev/bus/usb/:/dev/bus/usb/
            - /usr/local/share/uhd/images:/usr/share/uhd/images
        healthcheck:
            test: /bin/bash -c "pgrep nr-uesoftmodem"
            start_period: 10s
            start_interval: 500ms
            interval: 10s
            timeout: 5s
            retries: 5

  # ════════════════════════════════════════════════════════════
  #  UE  —  RFSimulator (no hardware)
  #  USE_ADDITIONAL_OPTIONS con --rfsim flags viene da .env.ue
  #  network_mode: host può raggiungere gNB su 172.22.0.25:4043
  # ════════════════════════════════════════════════════════════
  oai-nr-ue-rfsim:
        image: ${REGISTRY-oaisoftwarealliance/}${NRUE_IMG:-oai-nr-ue}:${TAG:-2026.w18}
        container_name: oai-nr-ue-rfsim 
        cap_drop:
            - ALL
        cap_add:
            - NET_ADMIN
            - NET_RAW
            - SYS_NICE
        privileged: true
        env_file:
          - .env.ue
        environment:
            UHD_IMAGES_DIR: "/usr/share/uhd/images"
        network_mode: host
        devices:
             - /dev/net/tun:/dev/net/tun
        volumes:
            - ./confs/ue_template.conf:/opt/oai-nr-ue/etc/nr-ue.conf
        healthcheck:
            test: /bin/bash -c "pgrep nr-uesoftmodem"
            start_period: 10s
            start_interval: 500ms
            interval: 10s
            timeout: 5s
            retries: 5

  # ════════════════════════════════════════════════════════════
  #  UE custom build  —  Physical (USRP)
  # ════════════════════════════════════════════════════════════
  ue-cst:
        build:
            context: .
            dockerfile: Dockerfile_ue
        image: ue-cst:latest
        container_name: ue-cst
        privileged: true
        cap_add:
            - SYS_NICE
            - IPC_LOCK
        mem_limit: 8g
        cap_drop:
            - ALL
        env_file:
          - .env.ue
        environment:
            UHD_IMAGES_DIR: "/usr/share/uhd/images"
        network_mode: host
        devices:
             - /dev/net/tun:/dev/net/tun
        volumes:
            - ./confs/ue_template.conf:/opt/oai-nr-ue/etc/nr-ue.conf
            - /dev/bus/usb/:/dev/bus/usb/
            - /usr/local/share/uhd/images:/usr/share/uhd/images
        healthcheck:
            test: /bin/bash -c "pgrep nr-uesoftmodem"
            start_period: 10s
            start_interval: 500ms
            interval: 10s
            timeout: 5s
            retries: 5

  # ════════════════════════════════════════════════════════════
  #  UE custom build  —  RFSimulator (no hardware)
  # ════════════════════════════════════════════════════════════
  ue-cst-rfsim:
        build:
            context: .
            dockerfile: Dockerfile_ue
        image: ue-cst:latest
        container_name: ue-cst
        privileged: true
        cap_add:
            - SYS_NICE
            - IPC_LOCK
        mem_limit: 8g
        cap_drop:
            - ALL
        env_file:
          - .env.ue
        environment:
            UHD_IMAGES_DIR: "/usr/share/uhd/images"
        network_mode: host
        devices:
             - /dev/net/tun:/dev/net/tun
        volumes:
            - ./confs/ue_template.conf:/opt/oai-nr-ue/etc/nr-ue.conf
        healthcheck:
            test: /bin/bash -c "pgrep nr-uesoftmodem"
            start_period: 10s
            start_interval: 500ms
            interval: 10s
            timeout: 5s
            retries: 5

networks:
  default:
    external: true
    name: docker_open5gs_default
  macvlan0:
    name: macvlan0
    driver: macvlan
    driver_opts:
      parent: enp1s0f0np0
    ipam:
      config:
        - subnet: 192.168.30.0/24
  macvlan1:
    name: macvlan1
    driver: macvlan
    driver_opts:
      parent: enp1s0f1np1
    ipam:
      config:
        - subnet: 192.168.31.0/24
  macvlan2:
    name: macvlan2
    driver: macvlan
    driver_opts:
      parent: enp1s0f2np2
    ipam:
      config:
        - subnet: 192.168.40.0/24
